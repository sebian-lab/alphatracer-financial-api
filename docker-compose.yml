version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: alphatracer-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_pass
      POSTGRES_DB: trading_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trading_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alphatracer-api
    restart: always
    ports:
      - "8011:8011"
    environment:
      DATABASE_URL: postgresql://postgres:postgres_secure_pass@db:5432/trading_db
      SECRET_KEY: alphatracer-super-secret-key-change-in-production-2024
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      PRIMARY_TICKER_CSV: https://raw.githubusercontent.com/abbadata/stock-tickers/main/data/all.csv
      SECONDARY_TICKER_CSV: https://raw.githubusercontent.com/Ate329/top-us-stock-tickers/main/tickers/all.csv
      TICKER_UPDATE_INTERVAL_HOURS: 12
      PRICE_API_PROVIDER: yfinance
      ALLOWED_ORIGINS: "*"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
