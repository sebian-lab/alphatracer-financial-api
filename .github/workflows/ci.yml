name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest bandit httpx

      - name: Run Python unit tests
        env:
          DATABASE_URL: "sqlite:///./test.db"
          SECRET_KEY: "test-secret-key-for-ci-pipeline-security-checks-only-1234"
          ALGORITHM: "HS256"
          ACCESS_TOKEN_EXPIRE_MINUTES: "60"
          PRIMARY_TICKER_CSV: "https://raw.githubusercontent.com/abbadata/stock-tickers/main/data/all.csv"
          SECONDARY_TICKER_CSV: "https://raw.githubusercontent.com/Ate329/top-us-stock-tickers/main/tickers/all.csv"
        run: |
          pytest

  sast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit SAST Scan
        run: bandit -r app/ -ll -ii

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Trivy Vulnerability Scanner (FS Scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'HIGH,CRITICAL'
